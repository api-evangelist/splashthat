apis:
  - name: Splash API
    description: >
      REST API for the Splash event marketing platform. Enables programmatic
      management of events, guest (GroupContact) records, organization-level
      contacts, ticketing, check-in, and event analytics. Authentication uses
      OAuth 2.0 client credentials flow with a Client ID and Client Secret
      issued by the Splash Customer Success team.
