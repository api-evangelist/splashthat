name: Splash
description: >
  Splash is an event marketing platform that helps companies market, manage,
  and measure their live, virtual, and hybrid event programs. The Splash REST
  API enables brands and agencies to programmatically manage events, handle
  guest registration, process check-in, and pull event analytics. API access
  uses OAuth 2.0 client credentials and covers resources such as events,
  group contacts (guests), contacts, and ticketing.
